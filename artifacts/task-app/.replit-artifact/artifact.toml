kind = "web"
previewPath = "/"
title = "TaskFlow"
version = "1.0.0"
id = "artifacts/task-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23220

[services.development]
run = "pnpm --filter @workspace/task-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/task-app", "run", "build" ]
publicDir = "artifacts/task-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23220"
BASE_PATH = "/"
