build:
  name: Build Android APK (pnpm monorepo)
  steps:
    - eas/checkout
    - run:
        name: Install compatible pnpm version
        command: npm install -g pnpm@10 --force
    - run:
        name: Install all workspace dependencies
        command: |
          REPO_ROOT=$(git -C "$EAS_BUILD_WORKINGDIR" rev-parse --show-toplevel 2>/dev/null || echo "$EAS_BUILD_WORKINGDIR")
          echo "Repo root: $REPO_ROOT"
          cd "$REPO_ROOT"
          pnpm install --no-frozen-lockfile --shamefully-hoist
    - run:
        name: Expo Prebuild (no install)
        working_directory: $EAS_BUILD_WORKINGDIR
        command: npx expo prebuild --platform android --no-install --clean
    - eas/gradle
