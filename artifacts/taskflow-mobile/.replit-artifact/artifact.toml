kind = "mobile"
previewPath = "/mobile/"
title = "TaskFlow Mobile"
version = "1.0.0"
id = "artifacts/taskflow-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22651

[services.development]
run = "pnpm --filter @workspace/taskflow-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taskflow-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/taskflow-mobile", "run", "serve" ]

[services.env]
PORT = "22651"
BASE_PATH = "/mobile/"
