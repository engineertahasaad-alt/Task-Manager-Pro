openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TaskFlow API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: tasks
    description: Task operations
  - name: chat
    description: Task chat messages
  - name: notifications
    description: Notifications
  - name: dashboard
    description: Dashboard data
  - name: reports
    description: Reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with mobile number and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change user password (required on first login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all team members
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new team member (owner/deputy only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/disable:
    patch:
      operationId: disableUser
      tags: [users]
      summary: Disable a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks with optional filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, completed, approved, reopened]
        - name: assigneeId
          in: query
          schema:
            type: ["integer", "null"]
        - name: dateFilter
          in: query
          schema:
            type: string
            enum: [today, this_week, this_month, custom]
        - name: startDate
          in: query
          schema:
            type: ["string", "null"]
        - name: endDate
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/complete:
    patch:
      operationId: completeTask
      tags: [tasks]
      summary: Employee marks task as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/approve:
    patch:
      operationId: approveTask
      tags: [tasks]
      summary: Manager/deputy approves completed task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/reopen:
    patch:
      operationId: reopenTask
      tags: [tasks]
      summary: Manager/deputy reopens a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task reopened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/messages:
    get:
      operationId: listMessages
      tags: [chat]
      summary: Get all chat messages for a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a chat message on a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Manager dashboard - task counts summary
      parameters:
        - name: dateFilter
          in: query
          schema:
            type: string
            enum: [today, this_week, this_month, custom]
        - name: startDate
          in: query
          schema:
            type: ["string", "null"]
        - name: endDate
          in: query
          schema:
            type: ["string", "null"]
        - name: assigneeId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/workload:
    get:
      operationId: getWorkloadByEmployee
      tags: [dashboard]
      summary: Task workload grouped by employee
      parameters:
        - name: dateFilter
          in: query
          schema:
            type: string
            enum: [today, this_week, this_month, custom]
        - name: startDate
          in: query
          schema:
            type: ["string", "null"]
        - name: endDate
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Workload by employee
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeWorkload"

  /dashboard/my-tasks:
    get:
      operationId: getMyTasks
      tags: [dashboard]
      summary: Employee dashboard - my tasks grouped by category
      responses:
        "200":
          description: My tasks summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyTasksSummary"

  /reports/daily:
    get:
      operationId: getDailyReport
      tags: [reports]
      summary: Generate daily report data
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportData"

  /reports/employee:
    get:
      operationId: getEmployeeReport
      tags: [reports]
      summary: Generate employee report data
      parameters:
        - name: employeeId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Employee report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportData"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginInput:
      type: object
      required: [mobile, password]
      properties:
        mobile:
          type: string
        password:
          type: string

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, fullName, mobile, role, isActive, mustChangePassword, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        mobile:
          type: string
        role:
          type: string
          enum: [owner, deputy, member]
        isActive:
          type: boolean
        mustChangePassword:
          type: boolean
        createdAt:
          type: string

    UserInput:
      type: object
      required: [fullName, mobile, role]
      properties:
        fullName:
          type: string
        mobile:
          type: string
        role:
          type: string
          enum: [owner, deputy, member]

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
        mobile:
          type: string
        role:
          type: string
          enum: [owner, deputy, member]

    Task:
      type: object
      required: [id, title, description, assigneeId, creatorId, deadline, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        assigneeId:
          type: integer
        assignee:
          $ref: "#/components/schemas/User"
        creatorId:
          type: integer
        creator:
          $ref: "#/components/schemas/User"
        deadline:
          type: string
        status:
          type: string
          enum: [open, completed, approved, reopened]
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    TaskInput:
      type: object
      required: [title, description, assigneeId, deadline]
      properties:
        title:
          type: string
        description:
          type: string
        assigneeId:
          type: integer
        deadline:
          type: string

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        assigneeId:
          type: integer
        deadline:
          type: string

    Attachment:
      type: object
      required: [id, taskId, filename, originalName, mimeType, size, url, createdAt]
      properties:
        id:
          type: integer
        taskId:
          type: integer
        filename:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        url:
          type: string
        createdAt:
          type: string

    Message:
      type: object
      required: [id, taskId, senderId, content, createdAt]
      properties:
        id:
          type: integer
        taskId:
          type: integer
        senderId:
          type: integer
        sender:
          $ref: "#/components/schemas/User"
        content:
          type: string
        attachmentUrl:
          type: ["string", "null"]
        attachmentName:
          type: ["string", "null"]
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        attachmentUrl:
          type: ["string", "null"]
        attachmentName:
          type: ["string", "null"]

    Notification:
      type: object
      required: [id, userId, type, message, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [task_assigned, deadline_approaching, task_completed, task_approved, task_reopened]
        message:
          type: string
        taskId:
          type: ["integer", "null"]
        isRead:
          type: boolean
        createdAt:
          type: string

    DashboardSummary:
      type: object
      required: [total, open, completed, approved, overdue]
      properties:
        total:
          type: integer
        open:
          type: integer
        completed:
          type: integer
        approved:
          type: integer
        overdue:
          type: integer

    EmployeeWorkload:
      type: object
      required: [userId, fullName, total, open, completed, approved, overdue]
      properties:
        userId:
          type: integer
        fullName:
          type: string
        total:
          type: integer
        open:
          type: integer
        completed:
          type: integer
        approved:
          type: integer
        overdue:
          type: integer

    MyTasksSummary:
      type: object
      required: [today, upcoming, overdue]
      properties:
        today:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        upcoming:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        overdue:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    ReportData:
      type: object
      required: [title, period, total, completed, approved, overdue, tasks]
      properties:
        title:
          type: string
        period:
          type: string
        total:
          type: integer
        completed:
          type: integer
        approved:
          type: integer
        overdue:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        employeeName:
          type: ["string", "null"]
